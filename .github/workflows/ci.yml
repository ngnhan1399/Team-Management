name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env.local
          python - <<'PY'
          from pathlib import Path
          env_path = Path(".env.local")
          content = env_path.read_text(encoding="utf-8")
          replacements = {
              "JWT_SECRET=": "JWT_SECRET=ci-jwt-secret-1234567890-abcdefghijklmnopqrstuvwxyz",
              "APP_ORIGIN=": "APP_ORIGIN=http://127.0.0.1:3100",
              "SEED_ADMIN_EMAIL=": "SEED_ADMIN_EMAIL=admin@demo.local",
              "SEED_ADMIN_PASSWORD=": "SEED_ADMIN_PASSWORD=change-me-before-e2e",
          }
          for prefix, replacement in replacements.items():
              lines = content.splitlines()
              updated = []
              replaced = False
              for line in lines:
                  if line.startswith(prefix):
                      updated.append(replacement)
                      replaced = True
                  else:
                      updated.append(line)
              if not replaced:
                  updated.append(replacement)
              content = "\n".join(updated) + "\n"
          env_path.write_text(content, encoding="utf-8")
          PY

      - name: Seed database
        run: npm run db:seed

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Lint
        run: npm run lint

      - name: Smoke test
        run: npm run test:smoke

      - name: E2E smoke
        run: npm run test:e2e-smoke
