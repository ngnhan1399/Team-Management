name: Scheduled Link Check

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 7 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      slot_key:
        description: "Optional custom slot key for manual runs"
        required: false
      limit:
        description: "Optional item limit for manual runs"
        required: false

jobs:
  run-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scheduled link check
        env:
          LINK_CHECK_URL: ${{ secrets.LINK_CHECK_URL }}
          LINK_CHECK_AUTOMATION_TOKEN: ${{ secrets.LINK_CHECK_AUTOMATION_TOKEN }}
          LINK_CHECK_SLOT_KEY: ${{ github.event.inputs.slot_key }}
          LINK_CHECK_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          if [ -z "$LINK_CHECK_URL" ] || [ -z "$LINK_CHECK_AUTOMATION_TOKEN" ]; then
            echo "LINK_CHECK_URL or LINK_CHECK_AUTOMATION_TOKEN is missing. Skipping."
            exit 0
          fi

          node scripts/link-check-browser-runner.mjs
